<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        #products{
            display: grid;
            /* grid-template-columns: repeat(3, 1fr); */
            /* grid-template-columns: 300px 1fr 3fr 2fr; */
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            grid-template-rows: 300px 20vh;
            gap: 1rem;
        }

        .item{
            background-color: rgb(20, 243, 20);
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
            color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <h1>Grid Layout</h1>
    <hr>
    <div id="products">
        <div class="item">SP 01</div>
        <div class="item">SP 02</div>
        <div class="item">SP 03</div>
        <div class="item">SP 04</div>
        <div class="item">SP 05</div>
        <div class="item">SP 06</div>
    </div>
</body>
</html>
