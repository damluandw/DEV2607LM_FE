<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* tag01 tag02: CSS tag02 nằm trong tag01 */
      #box1 span {
        color: red;
      }
      /* tag01>tag02: CSS tag02 là thẻ con của tag01 */
      #box2 > span {
        color: green;
      }
      /* Tag01+tag02: CSS tag02 nằm liền sau tag01 */
      #box3 p + span {
        color: blue;
      }
      /* Tag01~tag02: CSS tag02 nằm sau tag01 */
      #box4 p ~ span {
        color: blue;
      }
      /* Tag01,tag02: CSS cho cả tag01 và tag02 */
      #box1,
      #box2 {
        background-color: yellow;
      }
      /* Nguyên tắc ưu tiên trong CSS
      - CSS viết sau sẽ được ưu tiên sử dụng
      - !important-> #tên_id > [tên_thuộc_tính+giá_trị] > .tên_class >tên_thẻ
      - CSS càng chi tiết và càng gần thì càng được ưu tiên
      */
      div {
        /* background-color: aqua ; */
        background-color: aqua !important;
      }
    </style>
  </head>
  <body>
    <div id="box1">
      <span>tag01 tag02</span>
      <p>
        <span>tag01 tag02</span>
      </p>
    </div>
    <div id="box2">
      <span> tag01>tag02</span>
      <p>
        <span>tag01>tag02</span>
        <span>tag01>tag02</span>
        <span>tag01>tag02</span>
      </p>
    </div>
    <div id="box3">
      <p>tag01+tag02</p>
      <span>tag01+tag02</span>
      <span>tag01+tag02</span>
      <span>tag01+tag02</span>
    </div>

    <div id="box4">
      <p>tag01~tag02</p>
      <span>tag01~tag02</span>
      <span>tag01~tag02</span>
      <span>tag01~tag02</span>
      <p>
        <span>tag01~tag02</span>
      </p>
    </div>
  </body>
</html>
