<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện tập</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            margin: 0;
            padding: 0;
        }
        a{
            text-decoration: none;
            color: #fff;
        }

        ul{
            list-style: none;
            display: flex;
            justify-content: center;
            /* gap: 20px; */
            background-color: #323232;
        }
        li{
            padding: 20px;
            border-right: 1px solid red;
            position: relative;
        }
       
        ul :last-child{
            border-right:none;
        }
        li:hover>a{
           color: green; 
        }
        .menu-2{
            position: absolute;
            top: 100%;
            left: 0;
            display: none;
        }
        .menu-2>li{
            border: none;
        }
        li:hover .menu-2{
           display: block;
        }
    </style>
</head>
<body>
    <nav>
        <ul class="menu-1">
            <li><a href="#">Trang chủ</a></li>
            <li>
                <a href="#">Sản phẩm</a>
                <ul class="menu-2">
                    <li><a href="#">CSS3</a></li>
                    <li><a href="#">HTML5</a></li>
                    <li><a href="#">JavaScript</a></li>
                </ul>
            </li>
            <li><a href="#">Dịch vụ</a></li>
            <li><a href="#">Liên hệ</a></li>
            <li><a href="#">Giới thiệu</a></li>
        </ul>
    </nav>
</body>
</html>
